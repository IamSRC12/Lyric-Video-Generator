services:
  whisper-local:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisper-local
    ports:
      - "5000:5000"
    environment:
      # Model size: tiny, base, small, medium, large-v3
      # tiny = fastest, lowest quality
      # base = fast, good quality (RECOMMENDED)
      # small = medium speed, better quality
      # medium = slow, great quality
      # large-v3 = slowest, best quality
      - WHISPER_MODEL=base

      # Device: cpu or cuda (if you have NVIDIA GPU)
      - WHISPER_DEVICE=cpu

      # Compute type: int8 (CPU), float16 (GPU)
      - WHISPER_COMPUTE_TYPE=int8
    volumes:
      # Cache models so they don't re-download
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whisper-models:
    driver: local
