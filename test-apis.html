<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Lyric Video Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }

        .test-section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #444;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .success {
            color: #4CAF50;
        }

        .error {
            color: #f44336;
        }

        .warning {
            color: #ff9800;
        }
    </style>
</head>

<body>
    <h1>🧪 API Connection Test</h1>
    <p>Test which API providers are working</p>

    <div class="test-section">
        <h2>1. Test Groq API</h2>
        <button onclick="testGroq()">Test Groq</button>
        <div id="groqResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. Test OpenRouter API</h2>
        <button onclick="testOpenRouter()">Test OpenRouter</button>
        <div id="openrouterResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. Test AssemblyAI API</h2>
        <input type="password" id="assemblyaiKey" placeholder="Enter AssemblyAI API key"
            style="width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; color: white; border: 1px solid #444; border-radius: 5px;">
        <button onclick="testAssemblyAI()">Test AssemblyAI</button>
        <div id="assemblyaiResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Test Deepgram API</h2>
        <input type="password" id="deepgramKey" placeholder="Enter Deepgram API key"
            style="width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; color: white; border: 1px solid #444; border-radius: 5px;">
        <button onclick="testDeepgram()">Test Deepgram</button>
        <div id="deepgramResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. Test Local Docker</h2>
        <button onclick="testDocker()">Test Docker</button>
        <div id="dockerResult" class="result"></div>
    </div>

    <script>
        const OPENROUTER_KEY = '';

        async function testGroq() {
            const result = document.getElementById('groqResult');
            result.innerHTML = '⏳ Testing Groq API...';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${OPENROUTER_KEY}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `<span class="success">✅ Groq API is working!</span>\n${JSON.stringify(data, null, 2)}`;
                } else {
                    result.innerHTML = `<span class="error">❌ Groq API failed: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testOpenRouter() {
            const result = document.getElementById('openrouterResult');
            result.innerHTML = '⏳ Testing OpenRouter API...';

            try {
                const response = await fetch('https://openrouter.ai/api/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${OPENROUTER_KEY}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `<span class="success">✅ OpenRouter API is working!</span>\nFound ${data.data?.length || 0} models`;
                } else {
                    result.innerHTML = `<span class="error">❌ OpenRouter API failed: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testAssemblyAI() {
            const result = document.getElementById('assemblyaiResult');
            const apiKey = document.getElementById('assemblyaiKey').value;

            if (!apiKey) {
                result.innerHTML = '<span class="warning">⚠️ Please enter your AssemblyAI API key</span>';
                return;
            }

            result.innerHTML = '⏳ Testing AssemblyAI API...';

            try {
                const response = await fetch('https://api.assemblyai.com/v2/transcript', {
                    method: 'POST',
                    headers: {
                        'Authorization': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        audio_url: 'https://example.com/test.mp3'
                    })
                });

                if (response.ok || response.status === 400) {
                    result.innerHTML = `<span class="success">✅ AssemblyAI API key is valid!</span>`;
                } else if (response.status === 401) {
                    result.innerHTML = `<span class="error">❌ Invalid API key</span>`;
                } else {
                    result.innerHTML = `<span class="error">❌ AssemblyAI API failed: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testDeepgram() {
            const result = document.getElementById('deepgramResult');
            const apiKey = document.getElementById('deepgramKey').value;

            if (!apiKey) {
                result.innerHTML = '<span class="warning">⚠️ Please enter your Deepgram API key</span>';
                return;
            }

            result.innerHTML = '⏳ Testing Deepgram API...';

            try {
                const response = await fetch('https://api.deepgram.com/v1/projects', {
                    headers: {
                        'Authorization': `Token ${apiKey}`
                    }
                });

                if (response.ok) {
                    result.innerHTML = `<span class="success">✅ Deepgram API key is valid!</span>`;
                } else if (response.status === 401) {
                    result.innerHTML = `<span class="error">❌ Invalid API key</span>`;
                } else {
                    result.innerHTML = `<span class="error">❌ Deepgram API failed: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testDocker() {
            const result = document.getElementById('dockerResult');
            result.innerHTML = '⏳ Testing Docker Whisper...';

            try {
                const response = await fetch('http://localhost:5000/health');

                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `<span class="success">✅ Docker Whisper is running!</span>\n${JSON.stringify(data, null, 2)}`;
                } else {
                    result.innerHTML = `<span class="error">❌ Docker Whisper failed: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Docker Whisper is not running\nError: ${error.message}\n\nTo start Docker Whisper:\n1. Open PowerShell\n2. cd "a:\\Antigravity\\Project Universe\\Lyric-Video-Generator\\docker"\n3. docker-compose up -d</span>`;
            }
        }

        // Auto-test on load
        window.onload = () => {
            console.log('API Test Page Loaded');
            console.log('OpenRouter Key:', OPENROUTER_KEY ? 'Present' : 'Missing');
        };
    </script>
</body>

</html>
